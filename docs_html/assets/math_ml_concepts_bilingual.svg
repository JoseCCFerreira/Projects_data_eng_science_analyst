<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Mathematics, Statistics and Machine Learning / Matemática, Estatística e ML</title>
  <desc id="desc">Bilingual visual summary of formulas and where they are used in the projects.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:700 31px Arial;fill:#0f172a}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:15}.h{font:700 18px Arial;fill:#111827}.formula{font:700 14px Menlo,monospace;fill:#0f766e}.p{font:400 14px Arial;fill:#475569}</style></defs>
  <rect class="bg" width="1400" height="760"/><text x="70" y="70" class="title">Math, Statistics & ML / Matemática, Estatística e ML</text>
  <g transform="translate(70,130)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Mean + Standard Deviation</text><text x="22" y="66" class="formula">mean=sum(x)/n · std=sqrt(var)</text><text x="22" y="96" class="p">Variation in prices, sales, trips, wear</text><text x="22" y="121" class="p">Variação em preços, vendas, viagens, desgaste</text></g>
  <g transform="translate(505,130)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Z-Score + Outliers</text><text x="22" y="66" class="formula">z=(x-mean)/std</text><text x="22" y="96" class="p">Shock detection and anomaly flags</text><text x="22" y="121" class="p">Deteção de choques e anomalias</text></g>
  <g transform="translate(940,130)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Correlation</text><text x="22" y="66" class="formula">corr=cov(X,Y)/(stdX*stdY)</text><text x="22" y="96" class="p">Relationships, not causality</text><text x="22" y="121" class="p">Relações, não causalidade</text></g>
  <g transform="translate(70,325)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Time-Series Returns</text><text x="22" y="66" class="formula">return=(v_t/v_t-1 - 1)*100</text><text x="22" y="96" class="p">Monthly fuel, demand, sales changes</text><text x="22" y="121" class="p">Mudanças mensais em preços e procura</text></g>
  <g transform="translate(505,325)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Regression</text><text x="22" y="66" class="formula">y=β0+β1x1+...+error</text><text x="22" y="96" class="p">Forecasting and interpretable baselines</text><text x="22" y="121" class="p">Previsão e baselines interpretáveis</text></g>
  <g transform="translate(940,325)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Classification Metrics</text><text x="22" y="66" class="formula">precision=TP/(TP+FP)</text><text x="22" y="96" class="p">Risk flags and ML evaluation</text><text x="22" y="121" class="p">Risco e avaliação de modelos</text></g>
  <g transform="translate(290,520)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Clustering</text><text x="22" y="66" class="formula">distance=sqrt(sum((x-y)^2))</text><text x="22" y="96" class="p">Segmentation of stores, tyres, places</text><text x="22" y="121" class="p">Segmentação de lojas, pneus, locais</text></g>
  <g transform="translate(725,520)"><rect class="card" width="390" height="145"/><text x="22" y="36" class="h">Machine Learning Workflow</text><text x="22" y="66" class="formula">features → model → metrics → limits</text><text x="22" y="96" class="p">Train, evaluate, explain, document</text><text x="22" y="121" class="p">Treinar, avaliar, explicar, documentar</text></g>
</svg>
