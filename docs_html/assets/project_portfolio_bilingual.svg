<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Project Portfolio / Portfólio de Projetos</title>
  <desc id="desc">Six project cards with dashboard ports, repository status and analytical focus.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px Arial,sans-serif;fill:#0f172a}.subtitle{font:400 17px Arial,sans-serif;fill:#475569}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.h{font:700 20px Arial,sans-serif;fill:#111827}.p{font:400 15px Arial,sans-serif;fill:#334155}
      .port{font:700 18px Arial,sans-serif;fill:#0f766e}.tag{fill:#eef2ff;stroke:#c7d2fe;rx:9}.tagText{font:700 12px Arial,sans-serif;fill:#3730a3}
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text x="70" y="70" class="title">Project Portfolio / Portfólio de Projetos</text>
  <text x="70" y="104" class="subtitle">All projects remain individually runnable and integrated through the central access panel / Todos os projetos correm individualmente e ficam integrados no painel central</text>

  <g transform="translate(70,155)">
