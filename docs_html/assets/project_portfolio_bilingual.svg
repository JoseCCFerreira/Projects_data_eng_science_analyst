  <text x="70" y="705" class="subtitle">Repository links / Links dos repositórios: GitHub where available; local-only projects are still managed and runnable from this hub.</text>
  <text x="70" y="735" class="subtitle">Every dashboard has a dedicated port and can be started from Services / Cada dashboard tem porta própria e pode arrancar em Services.</text>
</svg>
