    <rect class="card" width="390" height="190"/><text x="24" y="42" class="h">Retail Analytics Learning</text><text x="24" y="73" class="port">Dashboard: 8613</text><text x="24" y="105" class="p">End-to-end retail learning path</text><text x="24" y="130" class="p">Percurso completo de retail analytics</text><rect x="24" y="150" width="70" height="24" class="tag"/><text x="59" y="167" text-anchor="middle" class="tagText">SQLite</text><rect x="104" y="150" width="76" height="24" class="tag"/><text x="142" y="167" text-anchor="middle" class="tagText">DuckDB</text><rect x="190" y="150" width="46" height="24" class="tag"/><text x="213" y="167" text-anchor="middle" class="tagText">dbt</text>
  </g>
