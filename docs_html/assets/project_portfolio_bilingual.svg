  </g>
  <g transform="translate(940,405)">
    <rect class="card" width="390" height="190"/><text x="24" y="42" class="h">Tyre Wear Intelligence</text><text x="24" y="73" class="port">Dashboard: 8615</text><text x="24" y="105" class="p">Tread depth, statistics, ML decisions</text><text x="24" y="130" class="p">Desgaste, estatística e decisão ML</text><rect x="24" y="150" width="96" height="24" class="tag"/><text x="72" y="167" text-anchor="middle" class="tagText">Statistics</text><rect x="130" y="150" width="54" height="24" class="tag"/><text x="157" y="167" text-anchor="middle" class="tagText">ML</text><rect x="194" y="150" width="86" height="24" class="tag"/><text x="237" y="167" text-anchor="middle" class="tagText">Streamlit</text>
